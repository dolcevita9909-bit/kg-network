<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대한민국 지식그래프 v3 — 계층형 연결망 (모바일 지원)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: #04050c; color: #e2e4ee; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { padding: 10px 16px; background: #12141c; border-bottom: 1px solid #232734; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  header h1 { font-size: 16px; font-weight: 600; margin-right: 6px; color: #f0f1f7; }
  header .meta { font-size: 12px; color: #7a7f92; }
  #search { padding: 6px 10px; border: 1px solid #2e3342; border-radius: 6px; font-size: 13px; width: 200px; background: #1a1d27; color: #e2e4ee; }
  #search::placeholder { color: #6a6f82; }
  .ctrl { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #9ba0b4; }
  .ctrl input[type=range] { width: 90px; }
  .legend { display: flex; gap: 10px; font-size: 12px; color: #9ba0b4; margin-left: auto; flex-wrap: wrap; }
  .legend span { display: flex; align-items: center; gap: 4px; cursor: pointer; user-select: none; }
  .legend span.off { opacity: 0.3; }
  .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
  #main { flex: 1; display: flex; min-height: 0; }
  #graph { flex: 1; min-width: 0; cursor: grab; }
  #graph:active { cursor: grabbing; }
  #panel { width: 330px; border-left: 1px solid #232734; background: #12141c; overflow-y: auto; padding: 16px; }
  #panel h2 { font-size: 17px; font-weight: 600; margin-bottom: 2px; color: #f0f1f7; }
  #panel .sub { font-size: 12px; color: #7a7f92; margin-bottom: 10px; }
  #panel .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin: 0 4px 8px 0; background: #222636; color: #aeb3c9; }
  #panel .def { font-size: 13px; line-height: 1.6; color: #c3c7d8; background: #1a1d29; border-radius: 8px; padding: 10px; margin-bottom: 14px; }
  #panel h3 { font-size: 13px; font-weight: 600; color: #9ba0b4; margin: 12px 0 6px; }
  .conn { padding: 8px 10px; border: 1px solid #262b3a; border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: background 0.15s; }
  .conn:hover { background: #1c2030; }
  .conn .cname { font-size: 13px; font-weight: 600; color: #e2e4ee; }
  .conn .crole { font-size: 11px; color: #7a7f92; }
  .conn .cwhy { font-size: 11.5px; color: #9ba0b4; margin-top: 3px; line-height: 1.45; }
  .score { float: right; font-size: 11px; font-weight: 600; color: #b98aff; }
  .hint { font-size: 12.5px; color: #6a6f82; line-height: 1.7; }
  #tooltip { position: absolute; pointer-events: none; background: rgba(30,30,30,0.9); color: #fff; font-size: 12px; padding: 5px 9px; border-radius: 6px; opacity: 0; transition: opacity 0.1s; max-width: 240px; z-index: 10; }
  button.reset { padding: 5px 10px; border: 1px solid #2e3342; background: #1a1d27; border-radius: 6px; font-size: 12px; cursor: pointer; color: #aeb3c9; }
  button.reset:hover { background: #222636; }
  @keyframes twinkle { 0%,100% { opacity: 0.1; } 50% { opacity: 0.85; } }
  .twinkle { animation: twinkle 5s ease-in-out infinite; }
  circle.star { filter: drop-shadow(0 0 5px currentColor); }
  html, body { overscroll-behavior: none; }
  #graph { touch-action: none; }
  .sheethandle { display: none; }
  @media (max-width: 768px) {
    header { gap: 8px; padding: 8px 12px; }
    header h1 { font-size: 14px; }
    #search { flex: 1; min-width: 120px; font-size: 16px; }
    .legend { margin-left: 0; width: 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 2px; }
    .legend span { flex-shrink: 0; }
    button.reset { padding: 8px 12px; }
    #panel { position: fixed; left: 0; right: 0; bottom: 0; width: 100%; height: 55%; border-left: none; border-top: 1px solid #2a3054; border-radius: 16px 16px 0 0; transform: translateY(105%); transition: transform 0.25s ease; z-index: 20; box-shadow: 0 -8px 30px rgba(0,0,0,0.5); }
    #panel.active { transform: translateY(calc(100% - 64px)); }
    #panel.active.open { transform: translateY(0); }
    .sheethandle { display: block; width: 44px; height: 5px; border-radius: 3px; background: #3a4060; margin: 2px auto 12px; cursor: pointer; }
    .conn { padding: 12px; }
    circle.star { filter: none; }
  }
  #sugg { position: absolute; top: 38px; left: 0; min-width: 100%; background: #161927; border: 1px solid #2e3342; border-radius: 8px; z-index: 30; max-height: 40vh; overflow-y: auto; display: none; }
  #sugg div { padding: 10px 12px; font-size: 14px; cursor: pointer; border-bottom: 1px solid #20243a; white-space: nowrap; }
  #sugg div:hover, #sugg div:active { background: #222636; }
  @media (max-width: 768px) { #suggwrap { flex: 1; } #suggwrap #search { width: 100%; } }
</style>
</head>
<body>
<header>
  <h1>대한민국 지식그래프 <span style="color:#7a7f92;font-weight:400">v3</span></h1>
  <span class="meta" id="meta"></span>
  <span id="suggwrap" style="position:relative"><input id="search" placeholder="키워드·종목 검색…" autocomplete="off"><div id="sugg"></div></span>
  <span class="ctrl">최소 연결 <input type="range" id="mindeg" min="0" max="10" value="1" step="1"><b id="mindegv">1</b></span>
  <button class="reset" id="resetBtn">전체 보기</button>
  <div class="legend" id="legend"></div>
</header>
<div id="main">
  <svg id="graph"></svg>
  <div id="panel">
    <h2>키워드 연결망</h2>
    <p class="sub">노드를 클릭하세요</p>
    <p class="hint">
      노드 클릭 → 관련 정보와 연결 목록이 이 패널에 표시됩니다.<br>
      연결 목록 클릭 → 해당 노드로 이동합니다.<br>
      마우스 휠 → 확대/축소, 드래그 → 이동.<br>
      상단 범례 클릭 → 유형별 표시/숨김.<br>
      빈 곳 더블클릭 → 선택 해제.
    </p>
  </div>
</div>
<div id="tooltip"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
const DATA = __DATA__;
const COLOR = { System: '#14286e', Theme: '#4263eb', SubTheme: '#5f3dc4', Detail: '#9775fa', Stock: '#e5bcff' };
const LABEL = { System: '시스템', Theme: '테마', SubTheme: '서브테마', Detail: '세부테마', Stock: '종목' };
const RANK = { System: 0, Theme: 1, SubTheme: 2, Detail: 3, Stock: 4 };
const LEVELS = ['System', 'Theme', 'SubTheme', 'Detail', 'Stock'];
const FR = { System: 0.08, Theme: 0.32, SubTheme: 0.54, Detail: 0.76, Stock: 1.0 };
const isMobile = matchMedia('(max-width: 768px)').matches || ('ontouchstart' in window && Math.min(screen.width, screen.height) < 820);
const visible = { System: true, Theme: true, SubTheme: true, Detail: true, Stock: true };
let minDeg = 1, selected = null;

const nodeById = new Map(DATA.nodes.map(d => [d.id, d]));
DATA.links.forEach((l, i) => { l.source = l.s; l.target = l.t; l.gid = i; });
const adj = new Map();
DATA.links.forEach(l => {
  if (!adj.has(l.s)) adj.set(l.s, []);
  if (!adj.has(l.t)) adj.set(l.t, []);
  adj.get(l.s).push({ other: l.t, link: l });
  adj.get(l.t).push({ other: l.s, link: l });
});
document.getElementById('meta').textContent = `노드 ${DATA.nodes.length.toLocaleString()} · 연결 ${DATA.links.length.toLocaleString()}`;

const NAMES = DATA.nodes.slice().sort((a,b) => b.deg - a.deg);

const legend = document.getElementById('legend');
Object.keys(COLOR).forEach(k => {
  const s = document.createElement('span');
  s.innerHTML = `<span class="dot" style="background:${COLOR[k]}"></span>${LABEL[k]}`;
  s.onclick = () => { visible[k] = !visible[k]; s.classList.toggle('off', !visible[k]); refresh(); };
  legend.appendChild(s);
});

const svg = d3.select('#graph');
const W = () => document.getElementById('graph').clientWidth;
const H = () => document.getElementById('graph').clientHeight;
const defs = svg.append('defs');
Object.entries(COLOR).forEach(([k, c]) => {
  const rg = defs.append('radialGradient').attr('id', 'ng-' + k);
  rg.append('stop').attr('offset', '0%').attr('stop-color', '#ffffff');
  rg.append('stop').attr('offset', '38%').attr('stop-color', c);
  rg.append('stop').attr('offset', '100%').attr('stop-color', d3.color(c).darker(1.1).formatHex());
});
['#16307e', '#5f3dc4', '#2a1060'].forEach((c, i) => {
  const ng = defs.append('radialGradient').attr('id', 'neb' + i);
  ng.append('stop').attr('offset', '0%').attr('stop-color', c).attr('stop-opacity', 0.32);
  ng.append('stop').attr('offset', '100%').attr('stop-color', c).attr('stop-opacity', 0);
});
const bg = svg.insert('g', ':first-child');
bg.append('circle').attr('cx', W() * 0.22).attr('cy', H() * 0.28).attr('r', Math.max(W(), H()) * 0.45).attr('fill', 'url(#neb0)');
bg.append('circle').attr('cx', W() * 0.78).attr('cy', H() * 0.72).attr('r', Math.max(W(), H()) * 0.5).attr('fill', 'url(#neb1)');
bg.append('circle').attr('cx', W() * 0.6).attr('cy', H() * 0.1).attr('r', Math.max(W(), H()) * 0.3).attr('fill', 'url(#neb2)');
for (let i = 0; i < (isMobile ? 110 : 230); i++) {
  bg.append('circle')
    .attr('cx', Math.random() * W()).attr('cy', Math.random() * H())
    .attr('r', Math.random() * 1.3 + 0.2)
    .attr('fill', i % 7 === 0 ? '#ffd9a0' : '#cdd6ff')
    .attr('class', 'twinkle')
    .style('animation-delay', (Math.random() * 6) + 's')
    .style('animation-duration', (3 + Math.random() * 5) + 's');
}
const g = svg.append('g');
const linkG = g.append('g'), nodeG = g.append('g'), textG = g.append('g');
let gradSel = null;
const zoom = d3.zoom().scaleExtent([0.15, 6]).on('zoom', e => { g.attr('transform', e.transform); updateLabels(e.transform.k); });
svg.call(zoom);
svg.on('dblclick.zoom', null);
svg.on('dblclick', () => select(null));
svg.on('click', () => select(null));

const R = () => Math.min(W(), H()) / 2 - 30;
const ringR = lvl => Math.max(R(), isMobile ? 320 : 200) * FR[lvl];
const sim = d3.forceSimulation()
  .force('link', d3.forceLink().id(d => d.id).strength(0.012).distance(80))
  .force('charge', d3.forceManyBody().strength(-5))
  .force('radial', d3.forceRadial(d => ringR(d.level) * (d.rj || 1), W() / 2, H() / 2).strength(1))
  .force('collide', d3.forceCollide(d => r(d) + 1.5));
const ringG = g.insert('g', ':first-child');
function drawRings() {
  ringG.selectAll('*').remove();
  const cx = W() / 2, cy = H() / 2;
  LEVELS.forEach(l => {
    ringG.append('circle').attr('cx', cx).attr('cy', cy).attr('r', ringR(l))
      .attr('fill', 'none').attr('stroke', '#2a3054').attr('stroke-dasharray', '3 6').attr('stroke-opacity', 0.55);
    ringG.append('text').attr('x', cx).attr('y', cy - ringR(l) - 7)
      .attr('text-anchor', 'middle').attr('font-size', 11).attr('fill', '#6a7092').text(LABEL[l]);
  });
}
drawRings();

function r(d) { return isMobile ? 2.2 + Math.min(Math.sqrt(d.deg) * 1.1, 7) : 3 + Math.min(Math.sqrt(d.deg) * 1.5, 12); }

let node, link, label, curNodes = [], curLinks = [];
function refresh() {
  curNodes = DATA.nodes.filter(d => visible[d.level] && d.deg >= minDeg || d === selected);
  const ids = new Set(curNodes.map(d => d.id));
  curLinks = DATA.links.filter(l => ids.has(l.s) && ids.has(l.t));

  const grad = defs.selectAll('linearGradient').data(curLinks, l => l.gid);
  grad.exit().remove();
  const gradEnter = grad.enter().append('linearGradient')
    .attr('id', l => 'lg' + l.gid).attr('gradientUnits', 'userSpaceOnUse');
  gradEnter.append('stop').attr('offset', '0%').attr('stop-color', l => COLOR[(nodeById.get(l.s) || {}).level] || '#5f3dc4');
  gradEnter.append('stop').attr('offset', '100%').attr('stop-color', l => COLOR[(nodeById.get(l.t) || {}).level] || '#5f3dc4');
  gradSel = gradEnter.merge(grad);

  link = linkG.selectAll('line').data(curLinks, l => l.s + '|' + l.t + '|' + l.role);
  link.exit().remove();
  link = link.enter().append('line').attr('stroke', l => 'url(#lg' + l.gid + ')').attr('stroke-width', 1).attr('stroke-opacity', isMobile ? 0.28 : 0.55).merge(link);

  node = nodeG.selectAll('circle').data(curNodes, d => d.id);
  node.exit().remove();
  node = node.enter().append('circle')
    .attr('r', r).attr('fill', d => 'url(#ng-' + d.level + ')').attr('class', 'star').style('color', d => COLOR[d.level])
    .attr('stroke', 'rgba(0,0,0,0)').attr('stroke-width', isMobile ? 14 : 0)
    .style('cursor', 'pointer')
    .on('click', (e, d) => { e.stopPropagation(); select(d); })
    .on('mousemove', (e, d) => {
      const t = document.getElementById('tooltip');
      t.style.opacity = 1; t.style.left = (e.pageX + 12) + 'px'; t.style.top = (e.pageY - 8) + 'px';
      t.textContent = `${d.name} (${LABEL[d.level]}, 연결 ${d.deg})`;
    })
    .on('mouseout', () => document.getElementById('tooltip').style.opacity = 0)
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.25).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }))
    .merge(node);

  label = textG.selectAll('text').data(curNodes, d => d.id);
  label.exit().remove();
  label = label.enter().append('text')
    .text(d => d.name).attr('font-size', 11).attr('fill', '#c9cce0')
    .attr('text-anchor', 'middle').attr('pointer-events', 'none')
    .merge(label);

  const cx = W() / 2, cy = H() / 2;
  const byLvl = {};
  curNodes.forEach(d => { (byLvl[d.level] = byLvl[d.level] || []).push(d); });
  Object.entries(byLvl).forEach(([lvl, arr]) => {
    arr.forEach((d, i) => {
      if (d.rj === undefined) d.rj = 0.92 + Math.random() * 0.16;
      if (d.x === undefined) {
        const a = (i / arr.length) * Math.PI * 2 + RANK[lvl] * 0.7;
        const rr = ringR(lvl) * d.rj;
        d.x = cx + rr * Math.cos(a); d.y = cy + rr * Math.sin(a);
      }
    });
  });
  sim.nodes(curNodes).on('tick', tick);
  sim.force('link').links(curLinks);
  sim.alpha(0.6).restart();
  applyHighlight();
  updateLabels(d3.zoomTransform(svg.node()).k);
}

function tick() {
  link.attr('x1', l => l.source.x).attr('y1', l => l.source.y).attr('x2', l => l.target.x).attr('y2', l => l.target.y);
  if (gradSel) gradSel.attr('x1', l => l.source.x).attr('y1', l => l.source.y).attr('x2', l => l.target.x + 0.01).attr('y2', l => l.target.y + 0.01);
  node.attr('cx', d => d.x).attr('cy', d => d.y);
  label.attr('x', d => d.x).attr('y', d => d.y - r(d) - 3);
}

let selKeep = new Set(), selLinks = new Set();
function computePath(d) {
  const keep = new Set([d.id]); const lks = new Set();
  (adj.get(d.id) || []).forEach(a => { keep.add(a.other); lks.add(a.link.gid); });
  const stack = [...keep]; const seen = new Set(stack);
  while (stack.length) {
    const id = stack.pop(); const n = nodeById.get(id); if (!n) continue;
    (adj.get(id) || []).forEach(a => {
      const m = nodeById.get(a.other); if (!m) return;
      if (RANK[m.level] < RANK[n.level]) {
        keep.add(m.id); lks.add(a.link.gid);
        if (!seen.has(m.id)) { seen.add(m.id); stack.push(m.id); }
      }
    });
  }
  return { keep, lks };
}

function updateLabels(k) {
  if (!label) return;
  label.attr('display', d => selected ? (selKeep.has(d.id) ? null : 'none') : (d.deg >= (k > 1.8 ? 1 : k > 0.9 ? 8 : 18) ? null : 'none'));
}

function applyHighlight() {
  if (!node) return;
  if (!selected) {
    node.attr('opacity', 1); link.attr('stroke-opacity', isMobile ? 0.28 : 0.55).attr('stroke-width', 1);
    return;
  }
  node.attr('opacity', d => selKeep.has(d.id) ? 1 : 0.06);
  link.attr('stroke-opacity', l => selLinks.has(l.gid) ? 0.95 : 0.03)
      .attr('stroke-width', l => selLinks.has(l.gid) ? 2 : 1);
}

function select(d) {
  selected = d;
  applyHighlight();
  updateLabels(d3.zoomTransform(svg.node()).k);
  const p = document.getElementById('panel');
  if (!d) {
    selKeep = new Set(); selLinks = new Set();
    p.classList.remove('active', 'open');
    p.innerHTML = '<h2>키워드 연결망</h2><p class="sub">노드를 클릭하세요</p><p class="hint">노드 클릭 → 관련 정보 표시<br>빈 곳 더블클릭 → 선택 해제</p>';
    return;
  }
  const res = computePath(d); selKeep = res.keep; selLinks = res.lks;
  applyHighlight(); updateLabels(d3.zoomTransform(svg.node()).k);
  const directLink = new Map();
  (adj.get(d.id) || []).forEach(a => directLink.set(a.other, a.link));
  let html = `<h2>${esc(d.name)}</h2><p class="sub">${esc(d.en || d.id)}</p>`;
  html += `<span class="badge" style="background:${COLOR[d.level]}33;color:${d.level==='Stock'?'#e5bcff':'#aeb3c9'}">${LABEL[d.level]}</span>`;
  html += `<span class="badge">연결 ${d.deg}</span>`;
  if (d.system) html += `<span class="badge">${esc(d.system)}</span>`;
  if (d.funds) html += `<span class="badge">편입펀드 ${esc(d.funds)}</span>`;
  if (d.def) html += `<div class="def">${esc(d.def)}</div>`;
  const flat = [];
  LEVELS.forEach(lvl => {
    const items = [...selKeep].map(id => nodeById.get(id))
      .filter(n => n && n.level === lvl && n.id !== d.id)
      .sort((a, b) => { const la = directLink.get(a.id), lb = directLink.get(b.id); return (+(lb && lb.score) || 0) - (+(la && la.score) || 0); });
    if (!items.length) return;
    html += `<h3>${LABEL[lvl]} ${items.length}개</h3>`;
    items.forEach(n => {
      const l = directLink.get(n.id); const i = flat.length; flat.push(n);
      html += `<div class="conn" data-i="${i}">
        <span class="score">${l && l.score ? l.score + '점' : ''}</span>
        <div class="cname"><span class="dot" style="background:${COLOR[n.level]};margin-right:5px"></span>${esc(n.name)}</div>
        ${l && l.role ? `<div class="crole">${esc(l.role)}</div>` : ''}
        ${l && l.why ? `<div class="cwhy">${esc(l.why)}</div>` : ''}
      </div>`;
    });
  });
  p.innerHTML = '<div class="sheethandle"></div>' + html;
  p.scrollTop = 0;
  p.classList.add('active', 'open');
  const hd = p.querySelector('.sheethandle');
  if (hd) hd.onclick = () => p.classList.toggle('open');
  p.querySelectorAll('.conn').forEach(el => el.onclick = () => focusNode(flat[+el.dataset.i]));
}

function focusNode(n) {
  if (!curNodes.includes(n)) { minDeg = 0; document.getElementById('mindeg').value = 0; document.getElementById('mindegv').textContent = 0; refresh(); }
  select(n);
  const t = d3.zoomTransform(svg.node());
  svg.transition().duration(500).call(zoom.transform,
    d3.zoomIdentity.translate(W() / 2 - n.x * t.k, H() / 2 - n.y * t.k).scale(t.k));
}

function esc(s) { return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

const searchEl = document.getElementById('search'), sugg = document.getElementById('sugg');
function showSugg(q) {
  if (!q) { sugg.style.display = 'none'; return; }
  const ql = q.toLowerCase();
  const hits = NAMES.filter(n => n.name.toLowerCase().includes(ql)).slice(0, 8);
  if (!hits.length) { sugg.style.display = 'none'; return; }
  sugg.innerHTML = hits.map((n, i) => `<div data-i="${i}"><span class="dot" style="background:${COLOR[n.level]};margin-right:6px"></span>${esc(n.name)} <span style="color:#6a6f82;font-size:11px">${LABEL[n.level]}</span></div>`).join('');
  sugg.style.display = 'block';
  sugg.querySelectorAll('div[data-i]').forEach(el => el.onclick = () => {
    const n = hits[+el.dataset.i]; searchEl.value = n.name; sugg.style.display = 'none'; focusNode(n); searchEl.blur();
  });
}
searchEl.addEventListener('input', e => showSugg(e.target.value));
searchEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = searchEl.value.toLowerCase();
    const n = NAMES.find(x => x.name.toLowerCase() === q) || NAMES.find(x => x.name.toLowerCase().includes(q));
    if (n) { sugg.style.display = 'none'; focusNode(n); searchEl.blur(); }
  }
});
document.addEventListener('click', e => { if (!sugg.contains(e.target) && e.target !== searchEl) sugg.style.display = 'none'; });
document.getElementById('mindeg').addEventListener('input', e => {
  minDeg = +e.target.value; document.getElementById('mindegv').textContent = minDeg; refresh();
});
document.getElementById('resetBtn').onclick = () => {
  selected = null; minDeg = 1;
  document.getElementById('mindeg').value = 1; document.getElementById('mindegv').textContent = 1;
  svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
  refresh(); select(null);
};
window.addEventListener('resize', () => { sim.force('radial', d3.forceRadial(d => ringR(d.level) * (d.rj || 1), W() / 2, H() / 2).strength(1)); drawRings(); sim.alpha(0.3).restart(); });

refresh();
const fitK = (Math.min(W(), H()) / 2 - 16) / ringR('Stock');
if (fitK < 1) svg.call(zoom.transform, d3.zoomIdentity.translate(W() / 2 * (1 - fitK), H() / 2 * (1 - fitK)).scale(fitK));
</script>
</body>
</html>
