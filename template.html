<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대한민국 지식그래프 — 키워드 연결망</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: #fafaf8; color: #222; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { padding: 10px 16px; background: #fff; border-bottom: 1px solid #e2e0d8; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  header h1 { font-size: 16px; font-weight: 600; margin-right: 6px; }
  header .meta { font-size: 12px; color: #888; }
  #search { padding: 6px 10px; border: 1px solid #d5d3ca; border-radius: 6px; font-size: 13px; width: 200px; }
  .ctrl { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
  .ctrl input[type=range] { width: 90px; }
  .legend { display: flex; gap: 10px; font-size: 12px; color: #555; margin-left: auto; flex-wrap: wrap; }
  .legend span { display: flex; align-items: center; gap: 4px; cursor: pointer; user-select: none; }
  .legend span.off { opacity: 0.3; }
  .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
  #main { flex: 1; display: flex; min-height: 0; }
  #graph { flex: 1; min-width: 0; cursor: grab; }
  #graph:active { cursor: grabbing; }
  #panel { width: 330px; border-left: 1px solid #e2e0d8; background: #fff; overflow-y: auto; padding: 16px; }
  #panel h2 { font-size: 17px; font-weight: 600; margin-bottom: 2px; }
  #panel .sub { font-size: 12px; color: #888; margin-bottom: 10px; }
  #panel .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin: 0 4px 8px 0; background: #f0efe9; color: #555; }
  #panel .def { font-size: 13px; line-height: 1.6; color: #444; background: #f7f6f1; border-radius: 8px; padding: 10px; margin-bottom: 14px; }
  #panel h3 { font-size: 13px; font-weight: 600; color: #666; margin: 12px 0 6px; }
  .conn { padding: 8px 10px; border: 1px solid #eceae2; border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: background 0.15s; }
  .conn:hover { background: #f5f4ee; }
  .conn .cname { font-size: 13px; font-weight: 600; }
  .conn .crole { font-size: 11px; color: #888; }
  .conn .cwhy { font-size: 11.5px; color: #666; margin-top: 3px; line-height: 1.45; }
  .score { float: right; font-size: 11px; font-weight: 600; color: #d64541; }
  .hint { font-size: 12.5px; color: #999; line-height: 1.7; }
  #tooltip { position: absolute; pointer-events: none; background: rgba(30,30,30,0.9); color: #fff; font-size: 12px; padding: 5px 9px; border-radius: 6px; opacity: 0; transition: opacity 0.1s; max-width: 240px; z-index: 10; }
  button.reset { padding: 5px 10px; border: 1px solid #d5d3ca; background: #fff; border-radius: 6px; font-size: 12px; cursor: pointer; color: #555; }
  button.reset:hover { background: #f5f4ee; }
</style>
</head>
<body>
<header>
  <h1>대한민국 지식그래프</h1>
  <span class="meta" id="meta"></span>
  <input id="search" list="nodelist" placeholder="키워드·종목 검색…">
  <datalist id="nodelist"></datalist>
  <span class="ctrl">최소 연결 <input type="range" id="mindeg" min="0" max="10" value="1" step="1"><b id="mindegv">1</b></span>
  <button class="reset" id="resetBtn">전체 보기</button>
  <div class="legend" id="legend"></div>
</header>
<div id="main">
  <svg id="graph"></svg>
  <div id="panel">
    <h2>키워드 연결망</h2>
    <p class="sub">노드를 클릭하세요</p>
    <p class="hint">
      노드 클릭 → 관련 정보와 연결 목록이 이 패널에 표시됩니다.<br>
      연결 목록 클릭 → 해당 노드로 이동합니다.<br>
      마우스 휠 → 확대/축소, 드래그 → 이동.<br>
      상단 범례 클릭 → 유형별 표시/숨김.<br>
      빈 곳 더블클릭 → 선택 해제.
    </p>
  </div>
</div>
<div id="tooltip"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
const DATA = __DATA__;
const COLOR = { System: '#3d3d3d', Theme: '#d64541', SubTheme: '#b8b6ad', Detail: '#8a8880', Stock: '#27ae60' };
const LABEL = { System: '시스템', Theme: '테마', SubTheme: '서브테마', Detail: '세부테마', Stock: '종목' };
const visible = { System: true, Theme: true, SubTheme: true, Detail: true, Stock: true };
let minDeg = 1, selected = null;

const nodeById = new Map(DATA.nodes.map(d => [d.id, d]));
DATA.links.forEach(l => { l.source = l.s; l.target = l.t; });
const adj = new Map();
DATA.links.forEach(l => {
  if (!adj.has(l.s)) adj.set(l.s, []);
  if (!adj.has(l.t)) adj.set(l.t, []);
  adj.get(l.s).push({ other: l.t, link: l });
  adj.get(l.t).push({ other: l.s, link: l });
});
document.getElementById('meta').textContent = `노드 ${DATA.nodes.length.toLocaleString()} · 연결 ${DATA.links.length.toLocaleString()}`;

const dl = document.getElementById('nodelist');
DATA.nodes.slice().sort((a,b) => b.deg - a.deg).forEach(n => {
  const o = document.createElement('option'); o.value = n.name; dl.appendChild(o);
});

const legend = document.getElementById('legend');
Object.keys(COLOR).forEach(k => {
  const s = document.createElement('span');
  s.innerHTML = `<span class="dot" style="background:${COLOR[k]}"></span>${LABEL[k]}`;
  s.onclick = () => { visible[k] = !visible[k]; s.classList.toggle('off', !visible[k]); refresh(); };
  legend.appendChild(s);
});

const svg = d3.select('#graph');
const W = () => document.getElementById('graph').clientWidth;
const H = () => document.getElementById('graph').clientHeight;
const g = svg.append('g');
const linkG = g.append('g'), nodeG = g.append('g'), textG = g.append('g');
const zoom = d3.zoom().scaleExtent([0.15, 6]).on('zoom', e => { g.attr('transform', e.transform); updateLabels(e.transform.k); });
svg.call(zoom);
svg.on('dblclick.zoom', null);
svg.on('dblclick', () => select(null));

const sim = d3.forceSimulation()
  .force('link', d3.forceLink().id(d => d.id).distance(l => 40 + 10 / Math.sqrt(+l.score || 3)).strength(0.25))
  .force('charge', d3.forceManyBody().strength(d => -40 - d.deg * 6))
  .force('center', d3.forceCenter(W() / 2, H() / 2))
  .force('collide', d3.forceCollide(d => r(d) + 2));

function r(d) { return 3.5 + Math.min(Math.sqrt(d.deg) * 1.8, 16); }

let node, link, label, curNodes = [], curLinks = [];
function refresh() {
  curNodes = DATA.nodes.filter(d => visible[d.level] && d.deg >= minDeg || d === selected);
  const ids = new Set(curNodes.map(d => d.id));
  curLinks = DATA.links.filter(l => ids.has(l.s) && ids.has(l.t));

  link = linkG.selectAll('line').data(curLinks, l => l.s + '|' + l.t + '|' + l.role);
  link.exit().remove();
  link = link.enter().append('line').attr('stroke', '#cfcdc4').attr('stroke-width', 1).attr('stroke-opacity', 0.55).merge(link);

  node = nodeG.selectAll('circle').data(curNodes, d => d.id);
  node.exit().remove();
  node = node.enter().append('circle')
    .attr('r', r).attr('fill', d => COLOR[d.level]).attr('stroke', '#fff').attr('stroke-width', 1.2)
    .style('cursor', 'pointer')
    .on('click', (e, d) => { e.stopPropagation(); select(d); })
    .on('mousemove', (e, d) => {
      const t = document.getElementById('tooltip');
      t.style.opacity = 1; t.style.left = (e.pageX + 12) + 'px'; t.style.top = (e.pageY - 8) + 'px';
      t.textContent = `${d.name} (${LABEL[d.level]}, 연결 ${d.deg})`;
    })
    .on('mouseout', () => document.getElementById('tooltip').style.opacity = 0)
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.25).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }))
    .merge(node);

  label = textG.selectAll('text').data(curNodes, d => d.id);
  label.exit().remove();
  label = label.enter().append('text')
    .text(d => d.name).attr('font-size', 11).attr('fill', '#333')
    .attr('text-anchor', 'middle').attr('pointer-events', 'none')
    .merge(label);

  sim.nodes(curNodes).on('tick', tick);
  sim.force('link').links(curLinks);
  sim.alpha(0.6).restart();
  applyHighlight();
  updateLabels(d3.zoomTransform(svg.node()).k);
}

function tick() {
  link.attr('x1', l => l.source.x).attr('y1', l => l.source.y).attr('x2', l => l.target.x).attr('y2', l => l.target.y);
  node.attr('cx', d => d.x).attr('cy', d => d.y);
  label.attr('x', d => d.x).attr('y', d => d.y - r(d) - 3);
}

function updateLabels(k) {
  if (!label) return;
  label.attr('display', d => (selected && (d === selected || isNeighbor(d))) || d.deg >= (k > 1.8 ? 1 : k > 0.9 ? 8 : 18) ? null : 'none');
}

function isNeighbor(d) {
  if (!selected) return false;
  return (adj.get(selected.id) || []).some(a => a.other === d.id);
}

function applyHighlight() {
  if (!node) return;
  if (!selected) {
    node.attr('opacity', 1); link.attr('stroke', '#cfcdc4').attr('stroke-opacity', 0.55).attr('stroke-width', 1);
    return;
  }
  const nb = new Set((adj.get(selected.id) || []).map(a => a.other)); nb.add(selected.id);
  node.attr('opacity', d => nb.has(d.id) ? 1 : 0.12);
  link.attr('stroke', l => (l.s === selected.id || l.t === selected.id) ? '#d64541' : '#cfcdc4')
      .attr('stroke-opacity', l => (l.s === selected.id || l.t === selected.id) ? 0.9 : 0.08)
      .attr('stroke-width', l => (l.s === selected.id || l.t === selected.id) ? 1.6 : 1);
}

function select(d) {
  selected = d;
  applyHighlight();
  updateLabels(d3.zoomTransform(svg.node()).k);
  const p = document.getElementById('panel');
  if (!d) {
    p.innerHTML = '<h2>키워드 연결망</h2><p class="sub">노드를 클릭하세요</p><p class="hint">노드 클릭 → 관련 정보 표시<br>빈 곳 더블클릭 → 선택 해제</p>';
    return;
  }
  const conns = (adj.get(d.id) || []).map(a => ({ n: nodeById.get(a.other), l: a.link }))
    .filter(c => c.n).sort((x, y) => (+y.l.score || 0) - (+x.l.score || 0));
  let html = `<h2>${esc(d.name)}</h2><p class="sub">${esc(d.en || d.id)}</p>`;
  html += `<span class="badge" style="background:${COLOR[d.level]}22;color:${COLOR[d.level]}">${LABEL[d.level]}</span>`;
  html += `<span class="badge">연결 ${d.deg}</span>`;
  if (d.system) html += `<span class="badge">${esc(d.system)}</span>`;
  if (d.funds) html += `<span class="badge">퍸입펀드 ${esc(d.funds)}</span>`;
  if (d.def) html += `<div class="def">${esc(d.def)}</div>`;
  html += `<h3>연결된 노드 ${conns.length}개</h3>`;
  conns.forEach((c, i) => {
    html += `<div class="conn" data-i="${i}">
      <span class="score">${c.l.score ? c.l.score + '점' : ''}</span>
      <div class="cname"><span class="dot" style="background:${COLOR[c.n.level]};margin-right:5px"></span>${esc(c.n.name)}</div>
      <div class="crole">${esc(c.l.role || '')}</div>
      ${c.l.why ? `<div class="cwhy">${esc(c.l.why)}</div>` : ''}
    </div>`;
  });
  p.innerHTML = html;
  p.scrollTop = 0;
  p.querySelectorAll('.conn').forEach(el => el.onclick = () => {
    const c = conns[+el.dataset.i];
    focusNode(c.n);
  });
}

function focusNode(n) {
  if (!curNodes.includes(n)) { minDeg = 0; document.getElementById('mindeg').value = 0; document.getElementById('mindegv').textContent = 0; refresh(); }
  select(n);
  const t = d3.zoomTransform(svg.node());
  svg.transition().duration(500).call(zoom.transform,
    d3.zoomIdentity.translate(W() / 2 - n.x * t.k, H() / 2 - n.y * t.k).scale(t.k));
}

function esc(s) { return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

document.getElementById('search').addEventListener('change', e => {
  const n = DATA.nodes.find(d => d.name === e.target.value);
  if (n) focusNode(n);
});
document.getElementById('mindeg').addEventListener('input', e => {
  minDeg = +e.target.value; document.getElementById('mindegv').textContent = minDeg; refresh();
});
document.getElementById('resetBtn').onclick = () => {
  selected = null; minDeg = 1;
  document.getElementById('mindeg').value = 1; document.getElementById('mindegv').textContent = 1;
  svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
  refresh(); select(null);
};
window.addEventListener('resize', () => sim.force('center', d3.forceCenter(W() / 2, H() / 2)).alpha(0.3).restart());

refresh();
</script>
</body>
</html>
